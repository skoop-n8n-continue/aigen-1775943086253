<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #10181f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            /* Gentle breathing animation suitable for digital signage */
            animation: breathe 6s infinite ease-in-out;
        }

        h1 {
            font-size: 6vw;
            color: #4caf50;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        .time-display {
            font-size: 2.5vw;
            color: #88b38a;
            font-weight: 300;
        }

        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* Fallback responsive sizes for very small or very large screens */
        @media (max-width: 600px) {
            h1 { font-size: 10vw; }
            .time-display { font-size: 5vw; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World</h1>
        <div class="time-display" id="clock">Loading time...</div>
    </div>

    <script>
        // Update the clock every second
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('clock').textContent = timeString;
        }

        // Initialize clock immediately and set interval
        updateTime();
        setInterval(updateTime, 1000);
    </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
